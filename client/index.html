<!doctype html>
<html lang="es" class="notranslate" translate="no">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <meta name="google" content="notranslate" />
    <title>TUESDI — Tu Escenario Digital</title>

    <!-- SEO -->
    <meta name="description" content="Tu Escenario Digital. Visibilidad profesional para artistas sin intermediarios. Perfil público, contacto privado, sin comisiones." />
    <link rel="canonical" href="https://tuesdi.com/" />

    <!-- Icono del sitio (lo que Google muestra junto al resultado).
         Debe ser cuadrado y múltiplo de 48 px; favicon.ico incluye 16/32/48. -->
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="96x96" href="/icon-96.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#0d0d0f" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://tuesdi.com/" />
    <meta property="og:title" content="TUESDI — Tu Escenario Digital" />
    <meta property="og:description" content="Visibilidad profesional para artistas sin intermediarios. Perfil público, contacto privado, sin comisiones." />
    <meta property="og:image" content="https://tuesdi.com/gallery/concierto-confeti-luces.jpg" />
    <meta property="og:image:alt" content="Concierto con luces y confeti" />
    <meta property="og:site_name" content="TUESDI" />
    <meta property="og:locale" content="es_ES" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="TUESDI — Tu Escenario Digital" />
    <meta name="twitter:description" content="Visibilidad profesional para artistas sin intermediarios. Perfil público, contacto privado, sin comisiones." />
    <meta name="twitter:image" content="https://tuesdi.com/gallery/concierto-confeti-luces.jpg" />

    <!-- Datos estructurados: asocia el logo y el nombre a la marca. -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "TUESDI",
      "alternateName": "Tu Escenario Digital",
      "url": "https://tuesdi.com/",
      "logo": "https://tuesdi.com/icon-512.png",
      "description": "Plataforma española de visibilidad para artistas independientes y publicación de eventos culturales. Sin intermediarios ni comisiones.",
      "email": "hola@tuesdi.com",
      "areaServed": "ES"
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "TUESDI",
      "url": "https://tuesdi.com/",
      "inLanguage": "es-ES"
    }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100..900&family=Inter:wght@100..900&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  </head>

    <div id="root"></div>
